<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>廷冠食品 — 膨化食品生產製程 SOP 數位化與 AI 智慧稽核平台</title>
<script>
  if (location.protocol === "file:") {
    location.replace("http://localhost:3000/");
  }
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu@4.22.0/dist/tf-backend-cpu.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  :root{
    --c-bg:#ffffff; --c-bg2:#f7f7f7; --c-panel:#ffffff; --c-panel2:#f9f9f9;
    --c-line:#111111; --c-text:#111111; --c-mute:#555555;
    --c-accent:#d6282f; --c-accent2:#d6282f; --c-warn:#f59e0b; --c-danger:#ef4444;
    --c-good:#168a4a; --c-purple:#8d1118;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#fff;color:var(--c-text);font-family:"Noto Sans TC","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .glass{background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border:1px solid var(--c-line);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.08)}
  .panel{background:var(--c-panel);border:1px solid var(--c-line);border-radius:14px}
  .panel2{background:var(--c-panel2);border:1px solid var(--c-line);border-radius:12px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--c-line);transition:all .15s}
  .btn-primary{background:#d6282f;color:#fff;border:1px solid #d6282f}
  .btn-primary:hover{filter:brightness(1.1)}
  .btn-ghost{background:#fff;color:var(--c-text)}
  .btn-ghost:hover{background:#fff1f1;border-color:#d6282f}
  .btn-warn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1f1500;border:none}
  .btn-success{background:#168a4a;color:#fff;border:1px solid #168a4a}
  .btn-danger{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff;border:none}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.3px}
  .b-ok{background:#eefaf3;color:#136b3a;border:1px solid #136b3a}
  .b-warn{background:#fff7e6;color:#8a5200;border:1px solid #8a5200}
  .b-bad{background:#fff0f0;color:#b91c1c;border:1px solid #b91c1c}
  .b-info{background:#fff1f1;color:#d6282f;border:1px solid #d6282f}
  .b-purple{background:#fff1f1;color:#8d1118;border:1px solid #8d1118}
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;color:var(--c-mute);font-weight:500;transition:all .12s}
  .nav-item:hover{background:#fff1f1;color:var(--c-text)}
  .nav-item.active{background:#d6282f;color:#fff;border-left:3px solid #111;padding-left:11px}
  .pulse{width:8px;height:8px;border-radius:50%;background:#168a4a;box-shadow:0 0 0 0 rgba(22,138,74,.7);animation:p 1.6s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(22,138,74,.7)}70%{box-shadow:0 0 0 8px rgba(22,138,74,0)}100%{box-shadow:0 0 0 0 rgba(22,138,74,0)}}
  .pulse.warn{background:#f59e0b;box-shadow:0 0 0 0 rgba(245,158,11,.7);animation:pw 1.6s infinite}
  @keyframes pw{0%{box-shadow:0 0 0 0 rgba(245,158,11,.7)}70%{box-shadow:0 0 0 8px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}}
  .pulse.bad{background:#ef4444;box-shadow:0 0 0 0 rgba(239,68,68,.7);animation:pb 1s infinite}
  @keyframes pb{0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}70%{box-shadow:0 0 0 8px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
  .step-tile{position:relative;padding:14px;border-radius:12px;background:var(--c-panel2);border:1px solid var(--c-line);cursor:pointer;transition:all .15s}
  .step-tile:hover{border-color:var(--c-accent);transform:translateY(-1px)}
  .step-tile.done{border-color:#168a4a;background:#f2fbf5}
  .step-tile.active{border-color:#111;background:#fff1f1;box-shadow:0 0 0 2px rgba(214,40,47,.22)}
  .step-tile.skip{border-color:#f59e0b;background:linear-gradient(135deg,rgba(245,158,11,.08),var(--c-panel2))}
  .step-flow-row{display:flex;gap:8px;min-width:max-content}
  .step-flow-row .step-tile{flex:0 0 152px;min-width:152px}
  .step-title{font-size:13px;font-weight:700;margin-top:4px;line-height:1.25;white-space:nowrap}
  .step-duration-editor{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:800;color:var(--c-mute)}
  .step-duration-input{width:52px;padding:3px 6px;border:1px solid var(--c-line);border-radius:7px;background:#fff;color:#111;font:inherit;font-size:11px;font-weight:900;text-align:right}
  .step-duration-input:focus{outline:2px solid rgba(214,40,47,.25);border-color:#d6282f}
  .step-duration-input:disabled{background:#f2f2f2;color:var(--c-mute);cursor:not-allowed}
  .duration-edit-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;border:1px solid #d6282f;background:#fff;color:#d6282f;font-size:11px;font-weight:900}
  .duration-edit-badge.locked{border-color:#777;background:#f7f7f7;color:var(--c-mute)}
  .duration-lock-note{font-size:10px;font-weight:900;color:var(--c-mute);white-space:nowrap}
  .gauge-bar{height:8px;border-radius:4px;background:var(--c-line);overflow:hidden}
  .gauge-bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--c-accent2),var(--c-accent))}
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th,table.tbl td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--c-line)}
  table.tbl th{color:var(--c-mute);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;background:#f2f2f2}
  table.tbl tr:hover td{background:#fff6f6}
  .kpi-num{font-size:28px;font-weight:800;letter-spacing:-.5px}
  .role-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:#fff;border:1px solid #111;color:#111}
  .scroll-y{overflow-y:auto;max-height:100%}
  ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#111;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#d6282f}
  .check-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#fff;border:1px solid var(--c-line);cursor:pointer;user-select:none}
  .check-card.with-relation{align-items:flex-start}
  .check-card.checked{background:#f2fbf5;border-color:#168a4a}
  .check-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--c-mute);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
  .check-card.checked .check-box{background:#168a4a;border-color:#168a4a;color:#fff}
  .check-content{min-width:0;flex:1}
  .check-title{font-size:13px;font-weight:800;line-height:1.35}
  .check-relation{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;align-items:center}
  .check-relation-label{font-size:10px;font-weight:900;color:#d6282f;white-space:nowrap}
  .check-field-chip{display:inline-flex;align-items:center;padding:2px 7px;border:1px solid #111;border-radius:999px;background:#fff;font-size:10px;font-weight:800;color:#111}
  .check-input-hint{margin-top:7px;font-size:11px;line-height:1.45;color:var(--c-mute);font-weight:700}
  .check-form-btn{margin-top:8px;padding:4px 9px;border-radius:7px;border:1px solid #d6282f;background:#fff;color:#d6282f;font-size:11px;font-weight:900;cursor:pointer}
  .check-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
  .check-photo-btn{padding:4px 9px;border-radius:7px;border:1px solid #111;background:#fff;color:#111;font-size:11px;font-weight:900;cursor:pointer}
  .check-photo-strip{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .check-photo-thumb{width:46px;height:46px;border-radius:8px;background-size:cover;background-position:center;border:2px solid #168a4a;position:relative;cursor:pointer;overflow:hidden}
  .check-photo-thumb.ng{border-color:#ef4444}
  .check-photo-count{display:inline-flex;align-items:center;padding:2px 7px;border:1px solid #111;border-radius:999px;background:#fff;font-size:10px;font-weight:900;color:#111}
  .equipment-card{padding:14px;border-radius:12px;background:#fff;border:1px solid var(--c-line);position:relative;overflow:hidden}
  .equipment-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:#d6282f}
  .equipment-card.warn::before{background:linear-gradient(90deg,#f59e0b,#ef4444)}
  .equipment-card.danger::before{background:linear-gradient(90deg,#ef4444,#7f1d1d)}
  .ai-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;background:#d6282f;color:#fff}
  .toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 18px;border-radius:10px;background:var(--c-panel);border:1px solid var(--c-accent);box-shadow:0 8px 24px rgba(0,0,0,.4);animation:slidein .3s ease}
  @keyframes slidein{from{transform:translateX(120%)}to{transform:translateX(0)}}
  .login-bg{background:#fff}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .product-thumb{aspect-ratio:1;border-radius:8px;background:linear-gradient(135deg,#d4a155,#b8853a);position:relative;display:flex;align-items:center;justify-content:center;font-size:38px;border:2px solid transparent;cursor:pointer}
  .product-thumb.bad{background:linear-gradient(135deg,#7c3a1c,#4a2010)}
  .product-thumb.bad::after{content:"";position:absolute;width:14px;height:14px;background:#ef4444;border-radius:50%;top:6px;right:6px;border:2px solid #111}
  .product-thumb.good::after{content:"";position:absolute;width:14px;height:14px;background:#168a4a;border-radius:50%;top:6px;right:6px;border:2px solid #111}
  details>summary{cursor:pointer;list-style:none;outline:none}
  details>summary::-webkit-details-marker{display:none}
  details[open]>summary .arrow{transform:rotate(90deg)}
  .arrow{display:inline-block;transition:transform .15s}
  .scroll-x{overflow-x:auto;scrollbar-width:thin}
  @media(max-width:900px){.sidebar{position:fixed!important;left:-260px;top:0;height:100vh;z-index:40;transition:left .25s}.sidebar.open{left:0}.main-shift{margin-left:0!important}.mobile-menu{display:flex!important}}
  .mobile-menu{display:none}
  .train-progress{height:6px;border-radius:3px;background:var(--c-line);overflow:hidden}
  .train-progress>span{display:block;height:100%;background:#d6282f}
  .lang-select{appearance:auto;padding:7px 30px 7px 10px;border-radius:10px;background:var(--c-panel2);border:1px solid var(--c-line);color:var(--c-text);font:inherit;font-size:12px;font-weight:700}
  .lang-select:focus{outline:2px solid rgba(214,40,47,.35);border-color:var(--c-accent)}
  .brand-lockup{display:flex;align-items:center;gap:12px;min-width:0}
  .header-lockup{flex:0 1 300px}
  .brand-logo{display:block;object-fit:contain;background:#fff;border:1px solid var(--c-line);border-radius:6px;box-shadow:0 2px 0 rgba(0,0,0,.08)}
  .brand-logo.login{width:128px;height:78px;padding:6px}
  .brand-logo.header{width:82px;height:50px;padding:4px;flex-shrink:0}
  .brand-text{min-width:0}
  .brand-name-line,.brand-tag{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sop-detail-layout{display:grid;grid-template-columns:minmax(0,1fr);gap:14px}
  .sop-detail-layout>div{min-width:0}
  .sop-detail-stack{display:grid;grid-template-columns:minmax(0,1fr);gap:14px}
  .sop-detail-stack .panel{margin-bottom:0!important}
  .operator-camera-stage{position:relative;aspect-ratio:16/10;min-height:360px;background:#f7f7f7;border:1px solid var(--c-line);border-radius:10px;overflow:hidden}
  .operator-camera-stage video{width:100%;height:100%;object-fit:cover;background:#fff}
  .operator-pose-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .operator-frame-hud{position:absolute;left:8px;right:8px;top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;z-index:2;pointer-events:none}
  .frame-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 7px;border-radius:6px;border:1px solid #111;background:rgba(255,255,255,.92);color:#111;font-size:10px;font-weight:800;letter-spacing:.2px}
  .frame-chip.live{background:#d6282f;color:#fff;border-color:#d6282f}
  .frame-chip.warn{background:#fff7e6;color:#8a5200;border-color:#8a5200}
  .frame-chip.ok{background:#eefaf3;color:#136b3a;border-color:#136b3a}
  .operator-frame-side{position:absolute;right:8px;top:46px;z-index:2;display:grid;gap:6px;width:min(150px,42%);pointer-events:none}
  .frame-metric{padding:6px 7px;border-radius:6px;border:1px solid #111;background:rgba(255,255,255,.9);font-size:10px;font-weight:800;color:#111}
  .operator-camera-overlay{position:absolute;left:8px;right:8px;bottom:8px;padding:7px 9px;border:1px solid #111;border-radius:8px;background:rgba(255,255,255,.92);color:#111;font-size:11px;font-weight:700}
  .motion-meter{height:8px;border-radius:999px;background:#f2f2f2;border:1px solid #111;overflow:hidden}
  .motion-meter>span{display:block;height:100%;width:0;background:#d6282f;transition:width .25s}
  .motion-grid{display:grid;grid-template-columns:minmax(0,1fr);gap:8px;margin-top:10px}
  .motion-chip{padding:8px;border:1px solid #111;border-radius:8px;background:#fff;font-size:11px;font-weight:700;color:#111}
  .operator-insight{margin-top:10px;padding:10px;border:1px solid #111;border-radius:8px;background:#fff7f7}
  .operator-insight-title{font-size:11px;font-weight:800;color:#d6282f;margin-bottom:4px}
  .operator-insight-body{font-size:12px;line-height:1.45;color:#111;font-weight:700}
  .param-source{display:grid;grid-template-columns:auto 1fr;gap:7px 8px;align-items:center;margin:0 0 10px;padding:9px 10px;border:1px solid #111;border-radius:8px;background:#fff7f7;color:#111}
  .param-source-label{font-size:11px;font-weight:900;color:#d6282f;white-space:nowrap}
  .param-source-chips{display:flex;gap:6px;flex-wrap:wrap}
  .param-source-chip{display:inline-flex;align-items:center;padding:3px 7px;border:1px solid #111;border-radius:999px;background:#fff;font-size:10px;font-weight:800}
  .param-source-note{grid-column:1/-1;font-size:11px;line-height:1.45;font-weight:700;color:#111}
  .sop-photo-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .sop-photo-tile{height:92px;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .sop-photo-empty{background:var(--c-panel2);border:2px dashed var(--c-line);flex-direction:column;color:var(--c-mute);font-size:22px}
  .sop-photo-empty.wide{grid-column:span 2}
  .sop-photo-sample{background:#fff;border:1px solid #111;color:#111;font-size:28px}
  .sop-photo-thumb{background-size:cover;background-position:center;cursor:pointer;position:relative}
  .context-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:10px 12px;margin-bottom:14px;align-items:stretch}
  @media(max-width:1180px){.sop-detail-layout{grid-template-columns:1fr}.operator-camera-stage{min-height:340px}}
  @media(max-width:900px){.context-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  @media(max-width:720px){.online-pill{display:none!important}.header-lockup{flex-basis:220px}.brand-tag{display:none}}
  @media(max-width:520px){.context-grid{grid-template-columns:1fr}.brand-logo.login{width:104px;height:64px}.brand-logo.header{width:58px;height:36px}.header-lockup{flex-basis:150px}.operator-camera-stage{min-height:270px}.param-source{grid-template-columns:1fr}.sop-photo-tile{height:78px}}
</style>
</head>
<body>

<!-- =================== LOGIN SCREEN =================== -->
<div id="loginScreen" class="login-bg" style="position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:20px">
  <div class="glass" style="width:100%;max-width:440px;padding:36px">
    <div class="brand-lockup" style="margin-bottom:8px">
      <img class="brand-logo login" src="assets/ting-guan-logo.jpg" alt="TING GUAN LOGO" />
      <div class="brand-text">
        <div style="font-size:20px;font-weight:800;letter-spacing:-.3px" data-i18n="brand.name">廷冠食品</div>
        <div style="font-size:12px;color:var(--c-mute)" data-i18n="login.subtitle">膨化食品生產製程 SOP 數位化與 AI 智慧稽核平台</div>
      </div>
    </div>
    <div style="height:1px;background:var(--c-line);margin:18px 0"></div>
    <div id="loginContextStep">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div>
          <label style="display:block;font-size:12px;color:var(--c-mute);font-weight:700;margin-bottom:5px" data-i18n="login.order">製令單號</label>
          <input id="loginOrderNo" value="MO-2026050408" placeholder="請輸入製令單號"
            style="width:100%;padding:10px 12px;border-radius:10px;background:#fff;border:1px solid var(--c-line);color:var(--c-text);font-family:inherit;font-size:13px" />
        </div>
        <div>
          <label style="display:block;font-size:12px;color:var(--c-mute);font-weight:700;margin-bottom:5px" data-i18n="login.shift">班別</label>
          <input id="loginShift" value="08:00-16:00" placeholder="請輸入起訖時間，例如 08:00-16:00"
            style="width:100%;padding:10px 12px;border-radius:10px;background:#fff;border:1px solid var(--c-line);color:var(--c-text);font-family:inherit;font-size:13px" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="loginNextStep()" style="width:100%;justify-content:center" data-i18n="login.next">創建</button>
      <div style="height:1px;background:var(--c-line);margin:16px 0"></div>
      <div style="font-size:12px;color:var(--c-mute);font-weight:700;margin-bottom:6px" data-i18n="login.existing">選擇已創建製令單號</div>
      <div style="display:flex;gap:8px">
        <select id="existingContextSelect" class="lang-select" style="width:100%;font-size:13px"></select>
        <button class="btn btn-ghost" onclick="useExistingContext()" style="white-space:nowrap" data-i18n="login.useExisting">使用</button>
      </div>
    </div>
    <div id="loginRoleStep" style="display:none">
      <div style="font-size:14px;color:var(--c-mute);margin-bottom:14px" data-i18n="login.choose">請選擇登入身分以體驗對應角色介面</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="btn btn-ghost" style="flex-direction:column;padding:14px;height:auto;align-items:flex-start" onclick="login('operator')">
          <div style="font-size:24px">👷</div>
          <div style="font-weight:700;font-size:14px" data-i18n="role.operator">產線作業員</div>
          <div style="font-size:11px;color:var(--c-mute)" data-i18n="role.operator.desc">SOP 步驟引導</div>
        </button>
        <button class="btn btn-ghost" style="flex-direction:column;padding:14px;height:auto;align-items:flex-start" onclick="login('qa')">
          <div style="font-size:24px">🔍</div>
          <div style="font-weight:700;font-size:14px" data-i18n="role.qa">品保稽核</div>
          <div style="font-size:11px;color:var(--c-mute)" data-i18n="role.qa.desc">AI 稽核 / 品質</div>
        </button>
        <button class="btn btn-ghost" style="flex-direction:column;padding:14px;height:auto;align-items:flex-start" onclick="login('engineer')">

          <div style="font-weight:700;font-size:14px" data-i18n="role.engineer">設備工程師</div>

function uniqueOptions(list) {
  return Array.from(new Set((list || []).map(v => String(v || "").trim()).filter(Boolean)));
}
function contextKey(ctx) {
  return String((ctx && ctx.order) || "") + "||" + String((ctx && ctx.shift) || "");
}
function normalizeContext(ctx) {
  return {
    order: String((ctx && ctx.order) || "").trim(),
    shift: String((ctx && ctx.shift) || "").trim()
  };
}
function syncProductionContexts() {
  const map = {};
  productionContexts.concat([{order:sopState.batch || "MO-2026050408", shift:sopState.shift || "08:00-16:00"}])
    .map(normalizeContext)
    .filter(ctx => ctx.order && ctx.shift)
    .forEach(ctx => { map[contextKey(ctx)] = ctx; });
  productionContexts = Object.values(map);
  workOrderOptions = uniqueOptions(productionContexts.map(ctx => ctx.order).concat(workOrderOptions));
  shiftOptions = uniqueOptions(productionContexts.map(ctx => ctx.shift).concat(shiftOptions));
}
function fillSelectOptions(selectEl, options, selectedValue) {
  if(!selectEl) return;
  const selected = String(selectedValue || "").trim();
  const list = uniqueOptions([selected].concat(options || []));
  selectEl.innerHTML = list.map(v => '<option value="'+_esc(v)+'">'+v+'</option>').join('');
  selectEl.value = selected || list[0] || "";
}
function addSelectableOption(kind) {
  const isOrder = kind === "order";
  const label = isOrder ? t("login.order") : t("login.shift");
  const example = isOrder ? "MO-2026050408" : "08:00-16:00";
  const value = (prompt(localText("新增", "Add", "Thêm") + " " + label, example) || "").trim();
  if(!value) return;
  if(isOrder) {
    workOrderOptions = uniqueOptions(workOrderOptions.concat(value));
    sopState.batch = value;
  } else {
    shiftOptions = uniqueOptions(shiftOptions.concat(value));
    sopState.shift = value;
  }
  syncLoginContextInputs();
  ssPersist();
  renderSessionContext();
  dbSaveContext(sopState.batch, sopState.shift);
  if(currentUser) navigate(currentPage);
}

function chartOpts(){
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:"#111111",boxWidth:10,font:{size:11}}}},
    scales:{
      y:{ticks:{color:"#555555"}, grid:{color:"rgba(0,0,0,.08)"}},
      x:{ticks:{color:"#555555"}, grid:{display:false}}
    }
  };
}
function kpiCard(icon,label,val,delta,kind,pct){
  const color = kind==="good"?"#168a4a":kind==="warn"?"#f59e0b":kind==="bad"?"#ef4444":"#d6282f";
  return `<div class="panel" style="padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:13px;color:var(--c-mute);font-weight:600">${icon} ${label}</div>
      <span class="badge ${kind==='good'?'b-ok':kind==='warn'?'b-warn':kind==='bad'?'b-bad':'b-info'}">${delta}</span>
    </div>
    <div class="kpi-num">${val}</div>
    <div class="gauge-bar" style="margin-top:10px"><span style="width:${pct}%;background:${color}"></span></div>
  </div>`;
}
function productionStations(){
  const stations = LANG==="zh"
    ? [["原料","ok","就緒"],["混料","ok","運轉"],["熱機","ok","68°C"],["膨化","warn","88°C"],["切割","ok","運轉"],["乾燥","ok","135°C"],["冷卻","ok","運轉"],["品檢","ok","AI 監控"]]
    : LANG==="vi"
      ? [["Nguyên liệu","ok","Sẵn sàng"],["Trộn","ok","Đang chạy"],["Gia nhiệt","ok","68°C"],["Đùn","warn","88°C"],["Cắt","ok","Đang chạy"],["Sấy","ok","135°C"],["Làm nguội","ok","Đang chạy"],["QC","ok","AI giám sát"]]
      : [["Material","ok","Ready"],["Mix","ok","Run"],["Heat","ok","68°C"],["Extrude","warn","88°C"],["Cut","ok","Run"],["Dry","ok","135°C"],["Cool","ok","Run"],["QC","ok","AI"]];
  return stations.map((s,i)=>`
    <div style="flex:1;min-width:90px;padding:12px;border-radius:10px;background:linear-gradient(180deg,var(--c-panel2),var(--c-panel));border:1px solid ${s[1]==='warn'?'#f59e0b':'var(--c-line)'};text-align:center">
      <div style="font-size:11px;color:var(--c-mute);font-weight:600">${String(i+1).padStart(2,'0')}</div>
      <div style="font-size:14px;font-weight:700;margin-top:4px">${s[0]}</div>
      <div style="margin-top:8px"><span class="pulse ${s[1]==='warn'?'warn':''}" style="display:inline-block;vertical-align:middle"></span></div>
      <div style="font-size:11px;color:var(--c-mute);margin-top:4px">${s[2]}</div>
    </div>
  `).join('<div style="display:flex;align-items:center;color:var(--c-mute)">→</div>');
}
function alertItem(sev, txt, val, time){
  const cls = sev==='high'?'b-bad':sev==='med'?'b-warn':'b-info';
  const pulse = sev==='high'?'pulse bad':sev==='med'?'pulse warn':'pulse';
  return `<div style="padding:11px 12px;border:1px solid var(--c-line);border-radius:10px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start">
    <span class="${pulse}" style="margin-top:6px"></span>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600">${txt}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span class="badge ${cls}">${val}</span>
        <span style="font-size:11px;color:var(--c-mute)">${time}</span>
      </div>
    </div>
  </div>`;
}

let sopState = {
  current:0, // index
  status: SOP_STEPS.map(()=>"pending"), // pending|done|skipped|active
  signatures: SOP_STEPS.map(()=>null),
  signatureDrafts: SOP_STEPS.map(()=>null),
  checks: SOP_STEPS.map(s=> (s.checksZh||[]).map(()=>false)),
  durations: SOP_STEPS.map(s=>Number(s.duration) || 0),
  batch:"MO-2026050408",
  shift:"08:00-16:00"
};

function sopSignerName(i) {
  const saved = sopState.signatureDrafts && sopState.signatureDrafts[i];
  return (saved && saved.trim()) || roleName(currentUser);
}
function sopSetSignerName(value) {
  if (!sopState.signatureDrafts) sopState.signatureDrafts = SOP_STEPS.map(()=>null);
  sopState.signatureDrafts[sopState.current] = value;
}
function sopEnsureDurations() {
  if (!Array.isArray(sopState.durations)) sopState.durations = [];
  SOP_STEPS.forEach(function(step, i) {
    const saved = Number(sopState.durations[i]);
    sopState.durations[i] = Number.isFinite(saved) && saved >= 0 ? saved : (Number(step.duration) || 0);
  });
}
function sopDuration(i) {
  sopEnsureDurations();
  return sopState.durations[i];
}
function sopStepChecked(i) {
  const checks = sopState.checks && sopState.checks[i];
  return Array.isArray(checks) && checks.length > 0 && checks.every(Boolean);
}
function sopDurationLocked(i) {
  const status = sopState.status && sopState.status[i];
  return status === "done" || status === "skipped" || sopStepChecked(i);
}
function sopDurationLockAttrs(i) {
  return sopDurationLocked(i) ? ' disabled title="檢核後時間已鎖定"' : '';
}
function sopDurationLockNote(i) {
  return sopDurationLocked(i) ? '<span class="duration-lock-note">已鎖定</span>' : '';
}
function sopSetDuration(i, value, rerender) {
  if (sopDurationLocked(i)) {
    if (rerender) renderSOP();
    return;
  }
  const n = Math.max(0, Math.min(999, Math.round(Number(value) || 0)));
  sopEnsureDurations();
  sopState.durations[i] = n;
  ssPersist();
  if (rerender) renderSOP();
}

function renderSOP(){
  // mark current step active
  if(!sopState.status.some(s=>s==="active")) sopState.status[sopState.current] = "active";

              <div class="step-duration-editor ${sopDurationLocked(i)?'locked':''}" onclick="event.stopPropagation()">
                <span>⏱</span>

                  oninput="sopSetDuration(${i},this.value,false)" onchange="sopSetDuration(${i},this.value,true)"${sopDurationLockAttrs(i)} />
                <span>min</span>
                ${sopDurationLockNote(i)}
              </div>
              <div style="margin-top:6px;font-size:11px">
                ${sopState.status[i]==='done'?'<span class="badge b-ok">✓</span>': sopState.status[i]==='active'?'<span class="badge b-info">●</span>': sopState.status[i]==='skipped'?'<span class="badge b-warn">⤴</span>':'<span class="badge" style="background:#f2f2f2;color:var(--c-mute);border:1px solid var(--c-line)">○</span>'}

              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Active step detail -->
    <div id="sopDetail"></div>
  `;
  document.getElementById("pageContainer").innerHTML = html;
  renderSOPDetail();
}

function sopGoto(i){
  // clear active
  sopState.status = sopState.status.map(s=> s==="active"?"pending":s);
  sopState.current = i;
  if(sopState.status[i]!=="done" && sopState.status[i]!=="skipped") sopState.status[i] = "active";
  renderSOP();
}
function sopToggleCheck(ci){
  sopState.checks[sopState.current][ci] = !sopState.checks[sopState.current][ci];
  renderSOP();
}
function sopComplete(){
  const i = sopState.current;
  const input = document.getElementById("sopSignerName");
  const who = ((input && input.value) || sopSignerName(i)).trim() || roleName(currentUser);
  sopSetSignerName(who);
  sopState.signatures[i] = {who, at:new Date().toLocaleString(localeCode())};
  sopState.status[i] = "done";
  showToast(localText(`✅ 步驟 ${i+1} 已完成簽核`,`✅ Step ${i+1} signed`,`✅ Bước ${i+1} đã hoàn tất ký duyệt`),"ok");
  if(i < SOP_STEPS.length-1){ sopState.current = i+1; sopState.status[i+1]="active"; }
  renderSOP();
}
function sopSkip(){
  const i = sopState.current;
  sopState.status[i] = "skipped";
  showToast(localText(`⤴ 步驟 ${i+1} 已標記跳過`,`⤴ Step ${i+1} skipped`,`⤴ Bước ${i+1} đã đánh dấu bỏ qua`),"warn");
  renderSOP();
}
function sopNext(){ if(sopState.current<SOP_STEPS.length-1) sopGoto(sopState.current+1); }
function sopPrev(){ if(sopState.current>0) sopGoto(sopState.current-1); }
</script>

/* ---- PERSISTENCE ---- */
function persistentPayload() {
  return {
    tickets: STATE.tickets, training: STATE.training, forms: STATE.forms,
    photos: STATE.photos, sopState, equipment: STATE.equipment,
    aiEvents: STATE.aiEvents, notifications: STATE.notifications,
    workOrderOptions, shiftOptions, productionContexts
  };
}

function applyPersistedState(d) {
  if (!d) return;
  if (d.tickets) STATE.tickets = d.tickets;
  if (d.training) STATE.training = d.training;
  if (d.forms) STATE.forms = d.forms;
  if (d.photos) STATE.photos = d.photos;
  if (d.equipment) Object.assign(STATE.equipment, d.equipment);
  if (d.aiEvents) STATE.aiEvents = d.aiEvents;
  if (d.notifications) STATE.notifications = d.notifications;
  if (d.workOrderOptions) workOrderOptions = uniqueOptions(d.workOrderOptions.concat(workOrderOptions));
  if (d.shiftOptions) shiftOptions = uniqueOptions(d.shiftOptions.concat(shiftOptions));
  if (d.productionContexts) productionContexts = d.productionContexts.concat(productionContexts).map(normalizeContext);
  if (d.sopState && typeof sopState !== 'undefined') {
    Object.assign(sopState, d.sopState);
    if (!sopState.signatureDrafts) sopState.signatureDrafts = SOP_STEPS.map(()=>null);
    sopEnsureDurations();
    if (!sopState.shift || sopState.shift === '早班') sopState.shift = '08:00-16:00';
    if (!sopState.batch || sopState.batch === 'B-2026050402' || sopState.batch === 'MO-2026050402') sopState.batch = 'MO-2026050408';
    workOrderOptions = uniqueOptions(workOrderOptions.concat(sopState.batch));
    shiftOptions = uniqueOptions(shiftOptions.concat(sopState.shift));
  }
  syncProductionContexts();
}

function ssPersist() {
  try {
    const payload = persistentPayload();
    localStorage.setItem('smartsop_state', JSON.stringify(payload));
    localStorage.setItem('smartsop_lang', LANG);
    dbQueueSaveState(payload);
  } catch(e) {}
}
function ssRestore() {
  try {
    const raw = localStorage.getItem('smartsop_state');
    if (raw) {
      applyPersistedState(JSON.parse(raw));
    }
    const l = localStorage.getItem('smartsop_lang');
    if (l && I18N[l]) LANG = l;
  } catch(e) {}
}
function ssReset() {
  try {
    localStorage.removeItem('smartsop_state');
    localStorage.removeItem('smartsop_lang');
    location.reload();
  } catch(e) {}
}

/* ---- ONLINE DATABASE SYNC ---- */
const DB_ENABLED = location.protocol === "http:" || location.protocol === "https:";
let dbSaveTimer = null;
let dbHydrating = false;

async function dbRequest(url, options) {
  if (!DB_ENABLED) return null;
  try {
    const res = await fetch(url, options);
    if (!res.ok) return null;
    return await res.json();
  } catch(e) {
    return null;
  }
}

function dbQueueSaveState(payload) {
  if (!DB_ENABLED || dbHydrating) return;
  clearTimeout(dbSaveTimer);
  dbSaveTimer = setTimeout(() => dbSaveState(payload || persistentPayload()), 350);
}

async function dbSaveState(payload) {
  await dbRequest("/api/state", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload || persistentPayload())
  });
}

async function dbLoadState() {
  const data = await dbRequest("/api/state");
  if (!data || !data.state) return false;
  dbHydrating = true;
  applyPersistedState(data.state);
  try {
    localStorage.setItem('smartsop_state', JSON.stringify(persistentPayload()));
  } catch(e) {}
  dbHydrating = false;
  return true;
}

async function dbLoadContexts() {
  const data = await dbRequest("/api/contexts");
  if (!data || !Array.isArray(data.contexts)) return;
  productionContexts = data.contexts
    .map(item => ({order: item.orderNo, shift: item.shift}))
    .concat(productionContexts)
    .map(normalizeContext);
  syncProductionContexts();
  syncLoginContextInputs();
}

async function dbSaveContext(orderNo, shift) {
  orderNo = String(orderNo || "").trim();
  shift = String(shift || "").trim();
  if (!orderNo || !shift) return;
  await dbRequest("/api/contexts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({orderNo, shift})
  });
}

/* ---- HELPERS ---- */
function nowHHMM() { const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function nowFull() { return new Date().toLocaleString(localeCode()); }
function _esc(s) { return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

/* ---- LIVE TICK ---- */
function startLiveTick() {
  if (STATE.liveTickId) clearInterval(STATE.liveTickId);
  STATE.liveTickId = setInterval(function() {
    Object.keys(STATE.equipment).forEach(function(id) {
      const params = STATE.equipment[id];
      Object.keys(params).forEach(function(k) {
        const v = params[k];
        const drift = (Math.random()-0.5) * (Math.abs(v)*0.012 + 0.05);
        params[k] = +(v + drift).toFixed(2);
      });
    });
    if (Math.random() < 0.06) generateRandomAIEvent();
    if (currentPage === 'equipment') updateEquipmentLive();
  }, 2500);
}

function updateEquipmentLive() {
  if (typeof EQUIPMENT === 'undefined') return;
  EQUIPMENT.forEach(function(e) {
    const live = STATE.equipment[e.id]; if (!live) return;
    e.params.forEach(function(p) {
      if (live[p.key] !== undefined) p.val = +live[p.key].toFixed(2);
    });
  });
  document.querySelectorAll('[data-eqparam]').forEach(function(el) {
    const parts = el.dataset.eqparam.split(':');
    const eq = EQUIPMENT.find(function(x){return x.id===parts[0]});
    const p = eq && eq.params.find(function(x){return x.key===parts[1]});
    if (!p) return;
    const inRange = p.val>=p.min && p.val<=p.max;
    const pct = Math.min(100, Math.max(0, (p.val-p.min)/(p.max-p.min)*100));
    const color = p.alert?'#ef4444':inRange?'#168a4a':'#f59e0b';
    const valEl = el.querySelector('[data-val]');
    if (valEl) { valEl.textContent = p.val + p.unit; valEl.style.color = color; }
    const bar = el.querySelector('[data-bar]');
    if (bar) { bar.style.width = pct+'%'; bar.style.background = color; }
  });
}

          '<button class="btn btn-success" onclick="ticketStatus(\''+tk.id+'\',\'completed\')">✓ '+localText('標記為完成','Mark complete','Đánh dấu hoàn tất')+'</button></div>'
        :

      ) +
    '</div>';
  openModal(html, {title:'🛠 '+tk.id, width:'600px'});
}
function ticketStatus(id, st) {
  const tk = STATE.tickets.find(function(t){return t.id===id});
  if (!tk) return;
  tk.status = st;
  ssPersist();
  closeModal(document.querySelector('.modal-bg'));
  showToast('✅ '+id+' → '+st, 'ok');
  if (currentPage === 'maintenance') navigate('maintenance');
}

function formFieldLabel(formId, fieldId) {
  const def = FORM_DEFS[formId];
  if (!def) return fieldId;
  const field = def.fields.find(function(f){ return f.id === fieldId; });
  return field ? byLang(field, 'label') : fieldId;
}
function formFieldInstruction(formId, fieldId) {
  const stepIdx = SOP_FORMID.indexOf(formId);
  if (stepIdx >= 0 && SOP_CHECK_LINKS[stepIdx]) {
    const found = SOP_CHECK_LINKS[stepIdx].find(function(link){
      return (link.fields || []).indexOf(fieldId) >= 0;
    });
    if (found) return byLang(found, 'hint');
  }
  return localText('請依現場實測值、檢查結果或異常說明填寫。','Enter the on-site measured value, inspection result, or abnormal note.','Nhập giá trị đo tại hiện trường, kết quả kiểm tra hoặc ghi chú bất thường.');
}
function normalizeFormFieldIds(def, fieldIds) {
  const valid = def.fields.map(function(f){ return f.id; });
  if (!Array.isArray(fieldIds) || !fieldIds.length) return valid;
  const seen = {};
  const ids = fieldIds.filter(function(id) {
    if (valid.indexOf(id) < 0 || seen[id]) return false;
    seen[id] = true;
    return true;
  });
  return ids.length ? ids : valid;
}

function formSave(formId, batchId, mode) {
  const def = FORM_DEFS[formId];
  const existing = (STATE.forms[batchId] && STATE.forms[batchId][formId]) || {};
  const scope = window._activeFormScope;
  const fieldIds = scope && scope.formId === formId && scope.batchId === batchId
    ? scope.fieldIds
    : def.fields.map(function(f){ return f.id; });
  const data = Object.assign({}, existing);
  def.fields.forEach(function(f){
    if (fieldIds.indexOf(f.id) < 0) return;
    const el = document.getElementById('ff_'+f.id);
    data[f.id] = el ? el.value : '';
  });
  mode = mode || 'sign';
  if (mode === 'sign') {
    data._signedBy = currentUser ? roleName(currentUser) : '—';
    data._signedAt = nowFull();
  } else {
    delete data._signedBy;
    delete data._signedAt;
    data._savedBy = currentUser ? roleName(currentUser) : '—';
    data._savedAt = nowFull();
  }
  if (!STATE.forms[batchId]) STATE.forms[batchId] = {};
  STATE.forms[batchId][formId] = data;
  ssPersist();
  closeModal(document.querySelector('.modal-bg'));
  window._activeFormScope = null;
  showToast(
    (mode === 'sign' ? '✍ ' : '💾 ') +
    (mode === 'sign'
      ? localText('已簽核','Signed','Đã ký duyệt')
      : localText('已儲存，尚未簽核','Saved, not signed yet','Đã lưu, chưa ký duyệt')),
    'ok'
  );
}

/* ---- PHOTO CAPTURE ---- */
function getCameraInput() {
  let input = document.getElementById('sopCameraInput');
  if (!input) {
    input = document.createElement('input');
    input.id = 'sopCameraInput';
    input.type = 'file';
    input.accept = 'image/*';
    input.setAttribute('capture', 'environment');
    input.style.cssText = 'position:fixed;left:-9999px;top:auto;width:1px;height:1px;opacity:0';
    document.body.appendChild(input);
  }
  input.accept = 'image/*';
  input.setAttribute('capture', 'environment');
  return input;
}
function takePhoto(stepIdx) {
  const input = getCameraInput();
  input.value = '';
  input.onchange = function(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    handleCameraPhoto(stepIdx, file, null);
    input.value = '';
  };
  input.click();
}
function takeCheckPhoto(stepIdx, checkIdx) {
  const input = getCameraInput();
  input.value = '';
  input.onchange = function(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    handleCameraPhoto(stepIdx, file, checkIdx);
    input.value = '';
  };
  input.click();
}
function handleCameraPhoto(stepIdx, file, checkIdx) {
  if (!window.FileReader) {
    showToast(localText('此裝置不支援讀取相機照片','This device cannot read camera photos','Thiết bị này không hỗ trợ đọc ảnh camera'), 'bad');
    return;
  }
  const reader = new FileReader();
  reader.onerror = function() {
    showToast(localText('照片讀取失敗，請再拍一次','Could not read the photo, please try again','Không đọc được ảnh, vui lòng chụp lại'), 'bad');
  };
  reader.onload = function(event) {
    resizeCapturedPhoto(event.target.result, function(url) {
      addPhotoRecord(stepIdx, url, file.name || localText('相機照片','Camera photo','Ảnh camera'), checkIdx);
    });
  };
  reader.readAsDataURL(file);
}
function resizeCapturedPhoto(src, done) {
  const img = new Image();
  img.onload = function() {
    const max = 1200;
    const scale = Math.min(1, max / img.width, max / img.height);
    const w = Math.max(1, Math.round(img.width * scale));
    const h = Math.max(1, Math.round(img.height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    done(canvas.toDataURL('image/jpeg', 0.86));
  };
  img.onerror = function() {
    done(src);
  };
  img.src = src;
}
function checkPhotoKey(stepIdx, checkIdx) {
  return 'step_'+stepIdx+'_check_'+checkIdx;
}

  if (!STATE.photos[key]) STATE.photos[key] = [];
  STATE.photos[key].push({url:url, isBad:isBad, time:nowFull(), name:name || '', source:'camera', checkIdx:checkIdx});
  ssPersist();
  showToast('📸 '+(checkIdx === null || checkIdx === undefined ? localText('已加入相機照片，AI 判定：','Camera photo added, AI result: ','Đã thêm ảnh camera, kết quả AI: ') : localText('檢核照片已加入，AI 判定：','Check photo added, AI result: ','Đã thêm ảnh kiểm tra, kết quả AI: '))+(isBad?'NG':'OK'), isBad?'warn':'ok');
  if (currentPage === 'sop') renderSOPDetail();
}

function takeDemoPhoto(stepIdx) {
  const canvas = document.createElement('canvas');
  canvas.width = 240; canvas.height = 240;
  const ctx = canvas.getContext('2d');
  const bg = ctx.createLinearGradient(0,0,240,240);
  bg.addColorStop(0,'#f7f7f7'); bg.addColorStop(1,'#ffffff');
  ctx.fillStyle = bg; ctx.fillRect(0,0,240,240);
  ctx.fillStyle = '#e5e5e5'; ctx.fillRect(0,140,240,60);
  for (let x=0;x<240;x+=20){ ctx.fillStyle = '#111111'; ctx.fillRect(x,140,2,60); }
  const isBad = Math.random() < 0.2;
  ctx.fillStyle = isBad ? '#7c3a1c' : '#d4a155';
  ctx.beginPath(); ctx.ellipse(120,140,55,30,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = isBad ? '#5a2a14' : '#b8853a';
  for (let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2; const r=Math.random()*40;
    ctx.beginPath(); ctx.arc(120+Math.cos(a)*r, 140+Math.sin(a)*r*0.55, 2+Math.random()*2, 0, Math.PI*2); ctx.fill();
  }
  if (isBad){
    ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(85,135); ctx.lineTo(105,148); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(140,128); ctx.lineTo(155,150); ctx.stroke();
  }
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,210,240,30);

const OPERATOR_POSE_LINKS = [
  ['left_shoulder','right_shoulder','#22c55e'], ['left_shoulder','left_elbow','#22c55e'], ['left_elbow','left_wrist','#22c55e'],
  ['right_shoulder','right_elbow','#22c55e'], ['right_elbow','right_wrist','#22c55e'], ['left_shoulder','left_hip','#22c55e'],
  ['right_shoulder','right_hip','#22c55e'], ['left_hip','right_hip','#22c55e'], ['left_hip','left_knee','#d6282f'],
  ['left_knee','left_ankle','#d6282f'], ['right_hip','right_knee','#d6282f'], ['right_knee','right_ankle','#d6282f']

function posePoint(pose, name, minScore) {
  if (!pose || !pose.keypoints) return null;
  const p = pose.keypoints.find(function(k){ return k.name === name; });
  return p && (p.score == null || p.score >= (minScore || 0.25)) ? p : null;
}
function clearOperatorPoseCanvas() {
  const canvas = document.getElementById('operatorPoseCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

}
function drawOperatorPose(pose, video) {
  const canvas = document.getElementById('operatorPoseCanvas');
  if (!canvas || !video) return;
  const w = video.videoWidth || 640;
  const h = video.videoHeight || 480;
  if (canvas.width !== w) canvas.width = w;
  if (canvas.height !== h) canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  if (!pose || !pose.keypoints) return;
  const visiblePoints = pose.keypoints.filter(function(p){ return p.score == null || p.score >= 0.28; });
  if (visiblePoints.length) {
    const xs = visiblePoints.map(function(p){ return p.x; });
    const ys = visiblePoints.map(function(p){ return p.y; });
    const minX = Math.max(0, Math.min.apply(null, xs) - 18);
    const minY = Math.max(0, Math.min.apply(null, ys) - 22);
    const maxX = Math.min(w, Math.max.apply(null, xs) + 18);
    const maxY = Math.min(h, Math.max.apply(null, ys) + 22);
    const boxW = maxX - minX;
    const boxH = maxY - minY;
    const score = Math.round((visiblePoints.length / Math.max(1, pose.keypoints.length)) * 100);
    ctx.strokeStyle = '#d6282f';
    ctx.lineWidth = Math.max(3, w / 220);
    ctx.setLineDash([Math.max(8, w / 90), Math.max(5, w / 150)]);
    ctx.strokeRect(minX, minY, boxW, boxH);
    ctx.setLineDash([]);
    ctx.fillStyle = '#d6282f';
    ctx.fillRect(minX, Math.max(0, minY - 28), Math.min(180, Math.max(112, boxW * .55)), 24);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold '+Math.max(12, Math.round(w / 54))+'px sans-serif';
    ctx.fillText('PERSON '+score+'%', minX + 8, Math.max(17, minY - 10));
  }
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  OPERATOR_POSE_LINKS.forEach(function(link) {
    const a = posePoint(pose, link[0], 0.28);
    const b = posePoint(pose, link[1], 0.28);
    if (!a || !b) return;
    ctx.strokeStyle = link[2];
    ctx.lineWidth = Math.max(4, w / 150);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  });
  pose.keypoints.forEach(function(p) {
    if (p.score != null && p.score < 0.28) return;
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#111111';
    ctx.lineWidth = Math.max(2, w / 360);
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(4, w / 130), 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  });
}
function poseShiftScore(pose, video) {
  if (!operatorCameraState.lastPose || !pose || !pose.keypoints) return 0;
  const base = Math.max(video.videoWidth || 640, video.videoHeight || 480);
  let total = 0, count = 0;
  pose.keypoints.forEach(function(p) {
    if (p.score != null && p.score < 0.28) return;
    const prev = operatorCameraState.lastPose.keypoints.find(function(k){ return k.name === p.name && (k.score == null || k.score >= 0.28); });
    if (!prev) return;
    const dx = p.x - prev.x;
    const dy = p.y - prev.y;
    total += Math.sqrt(dx * dx + dy * dy);
    count++;
  });
  return count ? Math.min(100, (total / count / base) * 420) : 0;
}

    setOperatorChip('operatorUpdatedChip', localText('更新：','Updated: ','Cập nhật: ')+nowHHMM());
    updateOperatorAdvice(localText('請確認鏡頭對準作業區，讓作業員至少露出頭部、肩膀與手部，AI 才能判斷動作是否符合 SOP。','Aim the camera at the work area and keep the operator head, shoulders, and hands visible so AI can verify SOP motion.','Hãy hướng camera vào khu vực thao tác và để thấy đầu, vai, tay của nhân viên để AI kiểm tra thao tác theo SOP.'));
    return;
  }
  const visible = pose.keypoints.filter(function(p){ return p.score == null || p.score >= 0.28; }).length;
  const poseScore = Math.round((visible / Math.max(1, pose.keypoints.length)) * 100);
  const poseMove = poseShiftScore(pose, video);
  const combinedMotion = Math.max(motion, Math.round(poseMove));
  const leftShoulder = posePoint(pose, 'left_shoulder', 0.28);
  const rightShoulder = posePoint(pose, 'right_shoulder', 0.28);
  const leftHip = posePoint(pose, 'left_hip', 0.28);
  const rightHip = posePoint(pose, 'right_hip', 0.28);
  const leftWrist = posePoint(pose, 'left_wrist', 0.28);
  const rightWrist = posePoint(pose, 'right_wrist', 0.28);
  const leftKnee = posePoint(pose, 'left_knee', 0.28);
  const rightKnee = posePoint(pose, 'right_knee', 0.28);
  const leftAnkle = posePoint(pose, 'left_ankle', 0.28);
  const rightAnkle = posePoint(pose, 'right_ankle', 0.28);
  const torsoVisible = !!(leftShoulder && rightShoulder && leftHip && rightHip);
  const fullBody = torsoVisible && !!((leftKnee || rightKnee) && (leftAnkle || rightAnkle));
  const shoulderY = leftShoulder && rightShoulder ? (leftShoulder.y + rightShoulder.y) / 2 : null;
  const handRaised = shoulderY != null && ((leftWrist && leftWrist.y < shoulderY) || (rightWrist && rightWrist.y < shoulderY));
  let kind = 'ok';
  let label = localText('骨架追蹤中：動作穩定，符合 SOP 節奏','Pose tracking: motion stable, aligned with SOP pace','Đang theo dõi khung xương: thao tác ổn định, phù hợp SOP');
  if (poseScore < 38 || !torsoVisible) {
    kind = 'warn';
    label = localText('骨架不完整：請調整鏡頭角度或距離','Pose incomplete: adjust camera angle or distance','Khung xương chưa đủ: chỉnh góc hoặc khoảng cách camera');
  } else if (combinedMotion > 58) {
    kind = 'warn';
    label = localText('骨架偵測到大幅動作，AI 建議主管確認','Large skeletal motion detected, supervisor check suggested','Phát hiện chuyển động khung xương lớn, đề nghị kiểm tra');
    maybeAddOperatorMotionEvent(combinedMotion);
  } else if (handRaised || combinedMotion > 26) {
    kind = 'ok';
    label = localText('作業動作中：手部與身體姿態持續比對 SOP','Operator active: hands and posture matching SOP','Đang thao tác: tay và tư thế được đối chiếu SOP');
  }
  updateOperatorMonitor(kind, label, combinedMotion);
  updateOperatorPersonChip(poseScore >= 38 && torsoVisible
    ? localText('人體：已偵測 ','Person: detected ','Người: đã phát hiện ') + poseScore + '%'
    : localText('人體：部分偵測 ','Person: partial ','Người: phát hiện một phần ') + poseScore + '%');
  updateOperatorFrameHud({
    person:'PERSON '+poseScore+'%',
    risk:kind === 'warn' ? 'RISK MED' : 'RISK LOW',
    riskKind:kind === 'warn' ? 'warn' : 'ok',
    model:'MoveNet',
    motion:'MOTION '+combinedMotion+'%',
    joints:'JOINTS '+visible+'/'+pose.keypoints.length,
    posture:fullBody ? 'FULL BODY' : torsoVisible ? 'UPPER BODY' : 'PARTIAL',
    updated:nowHHMM()
  });
  updateOperatorPoseChip(localText('骨架：','Pose: ','Khung xương: ')+visible+'/'+pose.keypoints.length+' · '+poseScore+'%');
  const posture = document.getElementById('operatorPostureChip');
  const hand = document.getElementById('operatorHandChip');
  const pace = document.getElementById('operatorPaceChip');
  const safety = document.getElementById('operatorSafetyChip');
  if (posture) posture.textContent = fullBody ? localText('站位：全身入鏡','Position: full body','Vị trí: toàn thân') : torsoVisible ? localText('站位：上半身入鏡','Position: upper body','Vị trí: nửa thân trên') : localText('站位：需調整','Position: adjust','Vị trí: cần chỉnh');
  if (hand) hand.textContent = handRaised ? localText('手部：抬手/取放','Hands: reach/place','Tay: với/đặt') : combinedMotion > 18 ? localText('手部：操作中','Hands: active','Tay: đang thao tác') : localText('手部：穩定','Hands: stable','Tay: ổn định');
  if (pace) pace.textContent = combinedMotion > 58 ? localText('節奏：過快','Pace: too fast','Nhịp: quá nhanh') : combinedMotion > 28 ? localText('節奏：操作中','Pace: active','Nhịp: đang thao tác') : localText('節奏：穩定','Pace: stable','Nhịp: ổn định');
  if (safety) safety.textContent = kind === 'warn' ? localText('安全：需確認','Safety: verify','An toàn: cần kiểm tra') : localText('安全：姿勢正常','Safety: posture OK','An toàn: tư thế OK');
  setOperatorChip('operatorModelChip', localText('模型：MoveNet','Model: MoveNet','Mô hình: MoveNet'));
  setOperatorChip('operatorJointChip', localText('關節：','Joints: ','Khớp: ')+visible+'/'+pose.keypoints.length);
  setOperatorChip('operatorTorsoChip', torsoVisible ? localText('軀幹：已鎖定','Torso: locked','Thân: đã khóa') : localText('軀幹：不完整','Torso: incomplete','Thân: chưa đủ'));
  setOperatorChip('operatorFullBodyChip', fullBody ? localText('全身：已入鏡','Full body: in frame','Toàn thân: trong khung') : localText('全身：部分入鏡','Full body: partial','Toàn thân: một phần'));
  setOperatorChip('operatorRiskChip', kind === 'warn' ? localText('風險：中','Risk: medium','Rủi ro: trung bình') : localText('風險：低','Risk: low','Rủi ro: thấp'));
  setOperatorChip('operatorUpdatedChip', localText('更新：','Updated: ','Cập nhật: ')+nowHHMM());
  updateOperatorAdvice(kind === 'warn'
    ? localText('AI 偵測到姿勢不完整或動作幅度偏大，建議主管確認作業員是否依 SOP 執行，並調整鏡頭距離。','AI detected incomplete pose or large motion. Supervisor should verify SOP compliance and adjust camera distance.','AI phát hiện tư thế chưa đủ hoặc chuyển động lớn; nên xác nhận thao tác đúng SOP và chỉnh khoảng cách camera.')
    : handRaised
      ? localText('偵測到手部取放/伸手動作，系統會持續比對目前 SOP 步驟節奏。','Reach/place hand motion detected; system will continue comparing against current SOP pace.','Phát hiện thao tác tay với/đặt; hệ thống tiếp tục đối chiếu nhịp SOP hiện tại.')
      : localText('人體與骨架辨識穩定，目前姿勢與動作節奏正常。','Person and pose detection are stable; posture and pace look normal.','Nhận diện người và khung xương ổn định; tư thế và nhịp thao tác bình thường.'));
  operatorCameraState.lastPose = {
    keypoints: pose.keypoints.map(function(p){ return {name:p.name, x:p.x, y:p.y, score:p.score}; })
  };
}
function updateOperatorMonitor(kind, label, motion) {
  const overlay = document.getElementById('operatorCameraOverlay');
  const status = document.getElementById('operatorMotionStatus');
  const score = document.getElementById('operatorMotionScore');
  const bar = document.getElementById('operatorMotionBar');
  const cls = kind === 'ok' ? 'b-ok' : kind === 'warn' ? 'b-warn' : kind === 'bad' ? 'b-bad' : 'b-info';
  if (overlay) overlay.textContent = label;
  if (status) status.textContent = label;
  if (score) { score.className = 'badge '+cls; score.textContent = motion + '%'; }
  if (bar) {
    bar.style.width = motion + '%';
    bar.style.background = kind === 'warn' ? '#f59e0b' : kind === 'bad' ? '#ef4444' : kind === 'ok' ? '#168a4a' : '#d6282f';
  }
  const posture = document.getElementById('operatorPostureChip');
  const hand = document.getElementById('operatorHandChip');
  const pace = document.getElementById('operatorPaceChip');
  const safety = document.getElementById('operatorSafetyChip');
  if (posture) posture.textContent = localText('站位：畫面內','Position: in frame','Vị trí: trong khung');
  if (hand) hand.textContent = motion > 12 ? localText('手部：操作中','Hands: active','Tay: đang thao tác') : localText('手部：待確認','Hands: checking','Tay: đang kiểm tra');
  if (pace) pace.textContent = motion > 45 ? localText('節奏：偏快','Pace: fast','Nhịp: nhanh') : localText('節奏：正常','Pace: normal','Nhịp: bình thường');
  if (safety) safety.textContent = kind === 'warn' ? localText('安全：需確認','Safety: verify','An toàn: cần kiểm tra') : localText('安全：監督中','Safety: monitoring','An toàn: đang giám sát');
}

    t:nowHHMM(),
    engZh:'作業員動作分析',

    engVi:'Phân tích thao tác nhân viên',

/* ---- ALERT HANDLING ---- */
function handleAlert(eqId) {
  const html =
    '<div style="display:grid;gap:14px">' +
      '<div class="panel2" style="padding:14px;border-color:#f59e0b">' +
        '<div style="font-weight:700;color:#fcd34d">⚠ '+localText('警示內容','Alert details','Chi tiết cảnh báo')+'</div>' +
        '<div style="font-size:13px;margin-top:6px;line-height:1.6">'+localText(eqId+' 偵測到參數超出 SOP 範圍。系統已自動建立警示。',eqId+' detected parameter out of SOP range.',eqId+' phát hiện thông số vượt phạm vi SOP. Hệ thống đã tự động tạo cảnh báo.')+'</div>' +
      '</div>' +
      '<div><div style="font-weight:700;margin-bottom:8px">'+localText('處理選項','Triage options','Tùy chọn xử lý')+'</div>' +
        '<div style="display:grid;gap:8px">' +
          '<button class="btn btn-ghost" style="justify-content:flex-start" onclick="alertResolve(\''+eqId+'\',\'ack\')">👁 '+localText('確認警示 (持續觀察)','Acknowledge','Xác nhận cảnh báo (tiếp tục theo dõi)')+'</button>' +
          '<button class="btn btn-ghost" style="justify-content:flex-start" onclick="alertResolve(\''+eqId+'\',\'adjust\')">⚙️ '+localText('調整參數至 SOP 範圍','Adjust to SOP range','Điều chỉnh thông số về phạm vi SOP')+'</button>' +
          '<button class="btn btn-ghost" style="justify-content:flex-start" onclick="alertResolve(\''+eqId+'\',\'stop\')">⛔ '+localText('停機並建立工單','Stop & create ticket','Dừng máy và tạo phiếu')+'</button>' +
          '<button class="btn btn-ghost" style="justify-content:flex-start" onclick="alertResolve(\''+eqId+'\',\'escalate\')">📞 '+localText('通知主管','Escalate to supervisor','Thông báo quản lý')+'</button>' +
        '</div></div>' +
    '</div>';
  openModal(html, {title:'⚠ '+localText('處理警示','Handle alert','Xử lý cảnh báo')+' — '+eqId, width:'520px'});
}
function alertResolve(eqId, action) {
  closeModal(document.querySelector('.modal-bg'));
  if (action === 'adjust') {
    if (eqId === 'TG-009' && STATE.equipment[eqId]) STATE.equipment[eqId].die_t = 76;
    const eq = EQUIPMENT.find(function(x){return x.id===eqId});
    if (eq) { eq.status = 'run'; eq.params.forEach(function(p){p.alert=false}); }
    showToast(localText('✅ '+eqId+' 已調整至 SOP 範圍','✅ '+eqId+' back in range','✅ '+eqId+' đã trở về phạm vi SOP'), 'ok');
  } else if (action === 'stop') {
    const eq = EQUIPMENT.find(function(x){return x.id===eqId});
    if (eq) eq.status = 'idle';
    showToast(localText('⛔ '+eqId+' 已停機','⛔ '+eqId+' stopped','⛔ '+eqId+' đã dừng máy'), 'warn');
    setTimeout(function(){ ticketCreate({eq:eqId, title:localText('警示後降溫處理','Alert cool-down','Xử lý làm nguội sau cảnh báo')}); }, 250);
  } else if (action === 'escalate') {
    showToast(localText('📞 已通知主管','📞 Supervisor notified','📞 Đã thông báo quản lý'), 'info');
  } else {
    showToast(localText('👁 已確認','👁 Acknowledged','👁 Đã xác nhận'), 'info');
  }
  ssPersist();
  if (currentPage === 'equipment') navigate('equipment');
}

let courseSession = null;
function courseOpen(idx) {
  if (!COURSES[idx]) return;
  courseSession = {idx:idx, sectionIdx:0, score:0, quizCount:0};
  if (!document.querySelector('.course-modal')) {
    const m = openModal('<div id="courseBody"></div>', {title:'🎓 '+byLang(COURSES[idx],'title'), width:'620px'});
    m.classList.add('course-modal');
  }
  courseRender();
}
function courseRender() {
  if (!courseSession) return;
  const c = COURSES[courseSession.idx];
  const total = c.sections.length;
  const i = courseSession.sectionIdx;
  const sec = c.sections[i];
  let body = '';
  if (sec.type === 'text') {
    body = '<div style="font-size:14px;line-height:1.8;padding:18px;background:rgba(255,255,255,.03);border-radius:10px;border-left:3px solid var(--c-accent)">'+optionText(sec)+'</div>';
  } else if (sec.type === 'quiz') {
    body = '<div style="font-size:15px;font-weight:700;margin-bottom:14px">❓ '+optionText(sec)+'</div>' +
      '<div style="display:grid;gap:8px">' +
      sec.options.map(function(o){return '<button class="btn btn-ghost" style="justify-content:flex-start;padding:14px;text-align:left" onclick="courseAnswer(\''+o.v+'\',\''+sec.answer+'\')">'+optionText(o)+'</button>'}).join('') +
      '</div>';
  }
  const isLast = i === total - 1;
  const html =
    '<div style="margin-bottom:14px"><div style="font-size:11px;color:var(--c-mute);font-weight:700;letter-spacing:1.5px">'+localText('課程','Course','Khóa học')+' M'+String(courseSession.idx+1).padStart(2,'0')+' · '+(i+1)+'/'+total+'</div>' +
    '<div class="train-progress" style="margin-top:6px"><span style="width:'+((i+1)/total*100)+'%"></span></div></div>' +
    body +
    '<div style="display:flex;gap:8px;justify-content:space-between;padding-top:18px;margin-top:18px;border-top:1px solid var(--c-line)">' +
      '<button class="btn btn-ghost" onclick="closeCourse()">'+localText('關閉','Close','Đóng')+'</button>' +
      '<div style="display:flex;gap:8px">' +
        (i>0 ? '<button class="btn btn-ghost" onclick="courseSession.sectionIdx--;courseRender()">← '+localText('上一頁','Back','Quay lại')+'</button>' : '') +
        (sec.type==='text' ? (isLast ?
          '<button class="btn btn-success" onclick="courseFinish()">✓ '+localText('完成課程','Finish','Hoàn thành khóa học')+'</button>' :
          '<button class="btn btn-primary" onclick="courseSession.sectionIdx++;courseRender()">'+localText('下一頁','Next','Tiếp theo')+' →</button>') : '') +
      '</div></div>';
  const cb = document.getElementById('courseBody');
  if (cb) cb.innerHTML = html;
}
function courseAnswer(val, correct) {
  courseSession.quizCount++;
  if (val === correct) { courseSession.score++; showToast(localText('✓ 答對','✓ Correct','✓ Chính xác'),'ok'); }
  else { showToast(localText('✗ 正確答案 '+correct.toUpperCase(),'✗ Correct: '+correct.toUpperCase(),'✗ Đáp án đúng: '+correct.toUpperCase()), 'warn'); }
  setTimeout(function(){
    const c = COURSES[courseSession.idx];
    if (courseSession.sectionIdx < c.sections.length - 1) {
      courseSession.sectionIdx++; courseRender();
    } else {
      courseFinish();
    }
  }, 700);
}
function courseFinish() {
  const idx = courseSession.idx;
  const score = courseSession.quizCount ? Math.round(courseSession.score/courseSession.quizCount*100) : 100;
  STATE.training.progress[idx] = 100;
  STATE.training.quizScores[idx] = score;
  ssPersist();
  closeCourse();
  showToast('✅ '+localText('課程完成 · 分數 '+score,'Completed · score '+score,'Hoàn thành khóa học · điểm '+score), 'ok');
  if (currentPage === 'training') navigate('training');
}
function closeCourse() { courseSession = null; closeModal(document.querySelector('.modal-bg.course-modal')); }
